server {
    listen 80;
    server_name typing.entrycl.net _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name typing.entrycl.net _;

    ssl_certificate     /etc/letsencrypt/live/typing.entrycl.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/typing.entrycl.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:; img-src 'self' data:;" always;

    # SPAフォールバック
    location / {
        # ユーザ画面へのアクセス許可IP
        allow 118.237.255.201;
        allow 221.241.89.198;
        deny all;

        try_files $uri $uri/ /index.html;
    }

    # 管理者画面へのアクセス制限（React Routerでのクライアントサイドのルーティングも考慮し、/admin パスへの直接アクセスを制限）
    location /admin {
        # 管理者画面へのアクセス許可IP
        allow 221.241.89.198;
        deny all;

        try_files $uri $uri/ /index.html;
    }

    # Socket.io リバースプロキシ
    location /socket.io {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API リバースプロキシ
    location /api {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静的ファイルキャッシュ
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
