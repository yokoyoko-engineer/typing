version: '3.8'

services:
  backend:
    build:
      context: ./backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGIN=http://localhost
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
