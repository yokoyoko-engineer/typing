version: '3.8'

services:
  backend:
    build:
      context: ./backend
    user: "root"
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGIN=http://localhost
    volumes:
      - typing_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  typing_data:
